<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dino Card</title>

  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .card {
      width: 90vw;
      max-width: 400px;
      aspect-ratio: 2 / 3;
      perspective: 1000px;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transition: transform 0.8s;
      transform-style: preserve-3d;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 20px;
      overflow: hidden;
    }

    .card-front {
      background: black;
    }

    .card-back {
      transform: rotateY(180deg);
    }

    video, img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>

<div class="card" id="card">
  <div class="card-inner">

    <!-- Vorderseite -->
    <div class="card-face card-front">
      <video 
        src="assets/dino.mp4"
        autoplay 
        muted 
        loop 
        playsinline>
      </video>
    </div>

    <!-- Rückseite -->
    <div class="card-face card-back">
      <img src="assets/back.jpg" alt="Back">
    </div>

  </div>
</div>

<script>
  const card = document.getElementById("card");

  // Zum Testen: Tap = Flip
  card.addEventListener("click", () => {
    card.classList.toggle("flipped");
  });
</script>

</body>
</html>
