<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dino Card</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #111 0%, #000 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
    }

    /* SOUND BUTTON */
    .sound-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 20;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      color: white;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
    }

    .card {
      width: 90vw;
      max-width: 400px;
      aspect-ratio: 2 / 3;
      perspective: 1200px;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transition: transform 0.9s cubic-bezier(.22,1,.36,1);
      transform-style: preserve-3d;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 20px;
      overflow: hidden;

      /* Glow Effekt */
      box-shadow:
        0 10px 40px rgba(0,0,0,0.8),
        0 0 30px rgba(0,255,150,0.2);
    }

    .card-front {
      background: black;
    }

    .card-back {
      transform: rotateY(180deg);
    }

    video, img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>

<button class="sound-btn" id="soundBtn">🔇 Sound</button>

<div class="card" id="card">
  <div class="card-inner">

    <!-- FRONT -->
    <div class="card-face card-front">
      <video 
        id="video"
        src="assets/dino.mp4"
        autoplay 
        muted 
        loop 
        playsinline>
      </video>
    </div>

    <!-- BACK -->
    <div class="card-face card-back">
      <img src="assets/back.jpg" alt="Back">
    </div>

  </div>
</div>

<script>
  const card = document.getElementById("card");
  const video = document.getElementById("video");
  const soundBtn = document.getElementById("soundBtn");

  let startX = 0;
  let endX = 0;

  const roar = new Audio("assets/roar.mp3");

  let soundOn = false;

  // SOUND BUTTON
  soundBtn.addEventListener("click", () => {
    soundOn = !soundOn;

    if (soundOn) {
      video.muted = false;
      video.play();
      soundBtn.innerText = "🔊 Sound";
    } else {
      video.muted = true;
      soundBtn.innerText = "🔇 Sound";
    }
  });

  // TOUCH START
  card.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
  });

  // TOUCH END
  card.addEventListener("touchend", (e) => {
    endX = e.changedTouches[0].clientX;
    let diff = startX - endX;

    if (Math.abs(diff) > 50) {
      card.classList.toggle("flipped");
    } else {
      roar.currentTime = 0;
      roar.play();
    }
  });
</script>

</body>
</html>
