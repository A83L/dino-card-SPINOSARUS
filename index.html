<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dino Card</title>

  <style>
    body {
  margin: 0;
  background: radial-gradient(circle at center, #111 0%, #000 100%);

  display: flex;
  justify-content: center;
  align-items: center;

  min-height: 100vh;
  overflow: hidden;
  font-family: sans-serif;
}

    /* BUTTONS OBEN */
    .top-ui {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);

  display: flex;
  gap: 10px;

  z-index: 999;
}

    .btn {
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(6px);
      color: white;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 14px;
    }

    .card {
      width: 90vw;
      max-width: 400px;
      aspect-ratio: 2 / 3;
      perspective: 1400px;
      position: relative;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 1s cubic-bezier(.2,.8,.2,1);
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 20px;
      overflow: hidden;

      box-shadow:
        0 25px 80px rgba(0,0,0,0.9),
        0 0 60px rgba(0,255,180,0.4),
        inset 0 0 25px rgba(255,255,255,0.08);
    }

    .card-front {
      background: black;
    }

    .card-back {
      transform: rotateY(180deg);
    }

   
    video, img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>

<div class="top-ui">
  <button class="btn" id="soundBtn">🔇 Sound</button>
  <button class="btn" id="motionBtn" style="display:none;">📱 Motion</button>
</div>

<div class="card" id="card">
  <div class="card-inner" id="cardInner">

    <div class="card-face card-front">
      <video 
        id="video"
        src="assets/dino.mp4"
        autoplay 
        muted 
        loop 
        playsinline>
      </video>
    </div>

    <div class="card-face card-back">
      <img src="assets/back.jpg" alt="Back">
    </div>

  </div>
</div>

<script>
  const card = document.getElementById("card");
  const inner = document.getElementById("cardInner");
  const video = document.getElementById("video");
  const soundBtn = document.getElementById("soundBtn");
  const motionBtn = document.getElementById("motionBtn");

  let startX = 0;
  let endX = 0;

  const roar = new Audio("assets/roar.mp3");

  let soundOn = false;

  // SOUND BUTTON
  soundBtn.addEventListener("click", () => {
    soundOn = !soundOn;

    if (soundOn) {
      video.muted = false;
      video.play();
      soundBtn.innerText = "🔊 Sound";
    } else {
      video.muted = true;
      soundBtn.innerText = "🔇 Sound";
    }
  });

  // SWIPE + TAP
  card.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
  });

  card.addEventListener("touchend", (e) => {
    endX = e.changedTouches[0].clientX;
    let diff = startX - endX;

    if (Math.abs(diff) > 50) {
      card.classList.toggle("flipped");
    } else {
      roar.currentTime = 0;
      roar.play();
    }
  });

  // TILT
let ticking = false;

function applyTilt(x, y) {
  if (ticking) return;
  ticking = true;

  requestAnimationFrame(() => {
    const rotateY = (x - 0.5) * 10;
    const rotateX = (0.5 - y) * 10;

    let base = card.classList.contains("flipped")
      ? "rotateY(180deg)"
      : "";

    inner.style.transform = `
      ${base}
      rotateY(${rotateY}deg)
      rotateX(${rotateX}deg)
    `;

    ticking = false;
  });
}

  // DESKTOP
  card.addEventListener("mousemove", (e) => {
    const rect = card.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    applyTilt(x, y);
  });

  card.addEventListener("mouseleave", () => {
    inner.style.transform = card.classList.contains("flipped")
      ? "rotateY(180deg)"
      : "";
  });

  // iOS CHECK
  if (typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function") {
    
    motionBtn.style.display = "block";

    motionBtn.addEventListener("click", () => {
      DeviceOrientationEvent.requestPermission()
        .then(response => {
          if (response === "granted") {
            window.addEventListener("deviceorientation", (e) => {
              let x = e.gamma / 30;
              let y = e.beta / 60;
              applyTilt(0.5 + x, 0.5 + y);
            });
            motionBtn.style.display = "none";
          }
        });
    });

  } else {
    // Android direkt aktiv
    let lastUpdate = 0;

window.addEventListener("deviceorientation", (e) => {
  const now = Date.now();
  if (now - lastUpdate < 50) return; // max ~20fps

  lastUpdate = now;

  let x = e.gamma / 30;
  let y = e.beta / 60;

  applyTilt(0.5 + x, 0.5 + y);
});
</script>

</body>
</html>
