<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dino Card</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #111 0%, #000 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
    }

    .top-ui {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 999;
    }

    .btn {
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(6px);
      color: white;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
    }

    .card {
      width: 90vw;
      max-width: 400px;
      aspect-ratio: 2 / 3;
      perspective: 1200px;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      transition: transform 0.8s ease;
      will-change: transform;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.9);

      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;

      transform: rotateY(0deg) translateZ(1px);
    }

    .card-back {
      transform: rotateY(180deg) translateZ(1px);
    }

    video, img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 🔥 FIXED FLASH (jetzt im 3D-Kontext) */
    .flash-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;

      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.4),
        transparent
      );

      transform: translateX(-150%) skewX(-20deg);
      opacity: 0;
    }

    .card.flash .flash-layer {
      animation: flashMove 0.6s ease;
    }

    @keyframes flashMove {
      0% {
        transform: translateX(-150%) skewX(-20deg);
        opacity: 1;
      }
      100% {
        transform: translateX(150%) skewX(-20deg);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<div class="top-ui">
  <button class="btn" id="soundBtn">🔇 Sound</button>
</div>

<div class="card" id="card">
  <div class="card-inner" id="cardInner">

    <!-- 🔥 Flash jetzt HIER drin -->
    <div class="flash-layer"></div>

    <div class="card-face">
      <video 
        id="video"
        src="assets/dino.mp4"
        autoplay 
        muted 
        loop 
        playsinline>
      </video>
    </div>

    <div class="card-face card-back">
      <img src="assets/back.jpg">
    </div>

  </div>
</div>

<script>
const card = document.getElementById("card");
const video = document.getElementById("video");
const soundBtn = document.getElementById("soundBtn");

let startX = 0;
let endX = 0;

const roar = new Audio("assets/roar.mp3");
const flipSound = new Audio("assets/flip.mp3");

let soundOn = false;

// SOUND BUTTON
soundBtn.addEventListener("click", () => {
  soundOn = !soundOn;

  if (soundOn) {
    video.muted = false;
    video.play();
    soundBtn.innerText = "🔊 Sound";
  } else {
    video.muted = true;
    soundBtn.innerText = "🔇 Sound";
  }
});

// FLIP FUNCTION
function flipCard() {
  card.classList.toggle("flipped");

  flipSound.currentTime = 0;
  flipSound.play();

  card.classList.add("flash");
  setTimeout(() => {
    card.classList.remove("flash");
  }, 600);
}

// TOUCH EVENTS
card.addEventListener("touchstart", (e) => {
  startX = e.touches[0].clientX;
});

card.addEventListener("touchend", (e) => {
  endX = e.changedTouches[0].clientX;
  let diff = startX - endX;

  if (Math.abs(diff) > 50) {
    flipCard();
  } else {
    roar.currentTime = 0;
    roar.play();
  }
});

// CLICK (Desktop)
card.addEventListener("click", () => {
  flipCard();
});
</script>

</body>
</html>
