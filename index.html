<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dino Card</title>

  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
    }

    .card {
      width: 90vw;
      max-width: 400px;
      aspect-ratio: 2 / 3; /* entspricht deinem 1024x1536 */
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
      background: black;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>

<div class="card">
  <video 
    src="assets/dino.mp4"
    autoplay 
    muted 
    loop 
    playsinline>
  </video>
</div>

</body>
</html>
