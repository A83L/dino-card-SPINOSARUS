<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dino Card</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #111 0%, #000 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
    }

    .card {
      width: 90vw;
      max-width: 400px;
      aspect-ratio: 2 / 3;
      perspective: 1400px;
      position: relative;
    }

    /* Button jetzt auf der Karte */
    .sound-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 50;

      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(6px);

      color: white;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 13px;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 1s cubic-bezier(.2,.8,.2,1);
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 20px;
      overflow: hidden;

      /* STARKER GLOW */
      box-shadow:
        0 25px 80px rgba(0,0,0,0.9),
        0 0 60px rgba(0,255,180,0.4),
        inset 0 0 25px rgba(255,255,255,0.08);
    }

    .card-front {
      background: black;
    }

    .card-back {
      transform: rotateY(180deg);
    }

    /* HOLOGRAPHIC SHIMMER */
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 20px;
      pointer-events: none;

      background: linear-gradient(
        120deg,
        rgba(255,0,150,0.2),
        rgba(0,255,255,0.2),
        rgba(255,255,0,0.2)
      );

      mix-blend-mode: overlay;
      opacity: 0.6;
      z-index: 10;
    }

    video, img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>

<div class="card" id="card">

  <button class="sound-btn" id="soundBtn">🔇</button>

  <div class="card-inner" id="cardInner">

    <!-- FRONT -->
    <div class="card-face card-front">
      <video 
        id="video"
        src="assets/dino.mp4"
        autoplay 
        muted 
        loop 
        playsinline>
      </video>
    </div>

    <!-- BACK -->
    <div class="card-face card-back">
      <img src="assets/back.jpg" alt="Back">
    </div>

  </div>
</div>

<script>
  const card = document.getElementById("card");
  const inner = document.getElementById("cardInner");
  const video = document.getElementById("video");
  const soundBtn = document.getElementById("soundBtn");

  let startX = 0;
  let endX = 0;

  const roar = new Audio("assets/roar.mp3");

  let soundOn = false;

  // SOUND BUTTON (Video Ton)
  soundBtn.addEventListener("click", () => {
    soundOn = !soundOn;

    if (soundOn) {
      video.muted = false;
      video.play();
      soundBtn.innerText = "🔊";
    } else {
      video.muted = true;
      soundBtn.innerText = "🔇";
    }
  });

  // TOUCH START
  card.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
  });

  // TOUCH END
  card.addEventListener("touchend", (e) => {
    endX = e.changedTouches[0].clientX;
    let diff = startX - endX;

    if (Math.abs(diff) > 50) {
      card.classList.toggle("flipped");
    } else {
      roar.currentTime = 0;
      roar.play();
    }
  });

  // ===== TILT / HOLOGRAPHIC EFFECT =====

  function applyTilt(x, y) {
    const rotateY = (x - 0.5) * 15;
    const rotateX = (0.5 - y) * 15;

    let base = card.classList.contains("flipped")
      ? "rotateY(180deg)"
      : "";

    inner.style.transform = `
      ${base}
      rotateY(${rotateY}deg)
      rotateX(${rotateX}deg)
    `;
  }

  // Maus (Desktop)
  card.addEventListener("mousemove", (e) => {
    const rect = card.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    applyTilt(x, y);
  });

  card.addEventListener("mouseleave", () => {
    inner.style.transform = card.classList.contains("flipped")
      ? "rotateY(180deg)"
      : "";
  });

  // Mobile Gyroscope (Android meist direkt ok)
  window.addEventListener("deviceorientation", (e) => {
    let x = e.gamma / 30;
    let y = e.beta / 60;

    applyTilt(0.5 + x, 0.5 + y);
  });
</script>

</body>
</html>
